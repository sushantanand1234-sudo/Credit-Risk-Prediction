<!DOCTYPE html>
<html>

<head>

    <title>Credit Risk Dashboard</title>

    <style>

        body{

            font-family:Arial;

            background:#f4f6f9;

            margin:0;

            padding:40px;

        }

        h1{

            text-align:center;

            color:#2c3e50;

        }

        .cards{

            display:flex;

            justify-content:center;

            gap:20px;

            margin-top:40px;

            flex-wrap:wrap;

        }

        .card{

            background:white;

            padding:25px;

            width:150px;

            border-radius:10px;

            text-align:center;

            box-shadow:0 2px 10px rgba(0,0,0,.15);

        }

        .card h2{

            margin:0;

            color:#3498db;

        }

        .charts{

            display:flex;

            justify-content:center;

            gap:40px;

            margin-top:50px;

            flex-wrap:wrap;

        }

        .charts img{

            width:450px;

            border-radius:10px;

            box-shadow:0 2px 10px rgba(0,0,0,.2);

        }

        .download{

            margin-top:50px;

            text-align:center;

        }

        .download a{

            text-decoration:none;

            background:#27ae60;

            color:white;

            padding:15px 40px;

            border-radius:8px;

            font-size:18px;

        }

    </style>

</head>

<body>

<h1>Credit Risk Prediction Dashboard</h1>

<div class="cards">

<div class="card">

<h3>Total</h3>

<h2>{{total}}</h2>

</div>

<div class="card">

<h3>P1</h3>

<h2>{{p1}}</h2>

</div>

<div class="card">

<h3>P2</h3>

<h2>{{p2}}</h2>

</div>

<div class="card">

<h3>P3</h3>

<h2>{{p3}}</h2>

</div>

<div class="card">

<h3>P4</h3>

<h2>{{p4}}</h2>

</div>

</div>

<div class="charts">

<img src="{{url_for('static',filename='pie_chart.png')}}">

<img src="{{url_for('static',filename='bar_chart.png')}}">

</div>
<hr style="margin-top:60px;">

<h2 style="text-align:center;color:#2c3e50;">
Top 20 Important Features
</h2>

<div style="text-align:center;margin-top:30px;">

<img
src="{{ url_for('static', filename='feature_importance.png') }}"
style="
width:85%;
border-radius:12px;
box-shadow:0px 4px 12px rgba(0,0,0,0.25);
">

</div>


<div class="download">

<a href="/download">

Download Prediction File

</a>

</div>

</body>

</html>
