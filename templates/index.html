<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Credit Risk Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

background:#f4f7fb;

}

.card{

margin-top:80px;

border-radius:20px;

box-shadow:0px 10px 25px rgba(0,0,0,.15);

}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card">

<div class="card-body p-5">

<h2 class="text-center mb-4">
🏦 Credit Risk Prediction System
</h2>

<p class="text-center text-muted">
Upload an Excel (.xlsx) or CSV file containing customer records.
</p>

<form action="/predict" method="POST" enctype="multipart/form-data">

<div class="mb-3">

<input
class="form-control"
type="file"
name="file"
required>

</div>

<div class="d-grid">

<button class="btn btn-primary btn-lg">

Predict

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
